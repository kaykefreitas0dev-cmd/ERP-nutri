# Cloudflare Worker — Healthcheck Supabase + Status Aggregator (ADR 0044 + v11.2 B.7)
# A cada execução:
#   1. POST /api/internal/workers/monitoring/health-aggregator → popula status page
#   2. GET /api/health/db → anti-pausa Supabase Free
#
# SETUP (PM, requer Cloudflare account):
#   cd cf-workers/health-keepalive
#   wrangler secret put INTERNAL_HEALTH_TOKEN   # = INTERNAL_HEALTH_TOKEN do Vercel web
#   wrangler deploy \
#     --var HEALTH_URL:https://erp-nutri-web.vercel.app/api/health/db \
#     --var AGGREGATOR_URL:https://erp-nutri-web.vercel.app/api/internal/workers/monitoring/health-aggregator

name = "nutricore-health-keepalive"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# Cron: a cada 15 min (96/dia, dentro do CF Workers free 100k/dia).
# Serve tanto o aggregator (status page fresca) quanto keepalive (anti-pausa).
[triggers]
crons = ["*/15 * * * *"]

# Vars (públicas; secrets via `wrangler secret put`)
[vars]
ENVIRONMENT = "production"
# HEALTH_URL + AGGREGATOR_URL setados via --var no deploy (ver SETUP acima)
# INTERNAL_HEALTH_TOKEN é secret → wrangler secret put

# Observability
[observability]
enabled = true
