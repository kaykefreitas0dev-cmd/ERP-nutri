name: Nightly Mutation Testing

on:
  schedule:
    # Seg/Qua/Sex 04:00 UTC = 01:00 BRT (ADR 0040)
    - cron: "0 4 * * 1,3,5"
  workflow_dispatch:

jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Stryker (escopado a packages/nutrition, incremental)
        run: pnpm exec stryker run --incremental
        continue-on-error: true

      - name: Upload Stryker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 14
